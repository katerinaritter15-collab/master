<!doctype html>
<html lang="ru">
  <head>

    <!-- Иконки -->

    />

    <!-- Стили -->
    <link rel="stylesheet" href="css/style.css" />

    <title>Master</title>

  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="container">
        <div class="logo-box">
          <img src="img/Logo.svg" alt="logo" class="logo" />

          <div class="logo-text">
            <span class="logo-subtitle">Памятник 40</span>
          </div>
        </div>

        <nav class="nav">
          <button type="button" class="nav-toggle">
            <span class="material-symbols-outlined">menu</span>

          <ul class="nav-list">
            <li class="nav-item nav-item--phone">
              <a href="tel:+79991234567" class="nav-link nav-link--phone">
                <span class="material-symbols-outlined">call</span>
                +7 (999) 123-45-67
              </a>

            <li class="nav-item"><a href="#" class="nav-link">Каталог</a></li>
            <li class="nav-item"><a href="#" class="nav-link">Услуги</a></li>

      </div>

    <section class="hero">
      <div class="conteiner-hero">
        <div class="flex-box-colum">
          <h1 class="h1">ПАМЯТНИКИ</h1>
          <h2 class="title-hero">
            <span class="subtitle-hero">Ручная работа</span>
            <span class="subtitle-hero">Натуральный камень</span>
          </h2>
          <div class="pg">
            <p class="text-hero">
              Профессиональное изготовление и установка памятников из гранита
              и мрамора. Полное благоустройство мест захоронений.
            </p>
          </div>
        </div>
        <button class="button"> Католог</button>

    <!-- JS -->
    <script src="js/script.js"></script>
